<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Astana Hajj & Umroh Travel</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Login Page Styles */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .login-logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    .login-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .login-sub {
      color: var(--text-light);
      font-size: 0.85rem;
      margin-bottom: 32px;
    }
    .error-msg {
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 0.85rem;
      text-align: left;
    }
    .login-card .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .login-card .form-label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text-dark);
    }
    .login-card .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid rgba(179,207,229,0.5);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .login-card .btn {
      width: 100%;
      justify-content: center;
      margin-top: 10px;
      padding: 14px;
    }
    .login-footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--text-light);
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">🕌</div>
    <h2>Admin Panel</h2>
    <p class="login-sub">Masukkan kredensial untuk mengakses dashboard</p>
    
    <div id="errorMsg" class="error-msg">
      ⚠️ Username atau password salah!
    </div>
    
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="admin" value="admin">
    </div>
    
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Masukkan password">
    </div>
    
    <button onclick="doLogin()" class="btn btn-primary">
      🔐 &nbsp; Login ke Dashboard
    </button>
    
    <div class="login-footer">
      <a href="index.html" style="color: var(--blue);">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  try {
    const response = await fetch('http://localhost:3000/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const result = await response.json();
    
    if (result.success) {
      // Set session/login status
      localStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminLoginTime', new Date().toISOString());
      // Redirect ke dashboard
      window.location.href = 'admin_dashboard.html';
    } else {
      showError();
    }
  } catch (error) {
    console.error('Login error:', error);
    showError();
  }
}

function showError() {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'block';
  setTimeout(() => {
    errorMsg.style.display = 'none';
  }, 3000);
}

// Jika sudah login, langsung redirect ke dashboard
if (localStorage.getItem('adminLoggedIn') === 'true') {
  window.location.href = 'admin_dashboard.html';
}
</script>

</body>
</html>
